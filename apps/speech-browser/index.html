<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hansard Speech Browser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --male-color: #3B82C4;
            --female-color: #EC4899;
            --bg-primary: #0f0f13;
            --bg-secondary: #18181f;
            --bg-tertiary: #1e1e27;
            --bg-elevated: #252530;
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --border-color: rgba(255,255,255,0.08);
            --accent: #8b5cf6;
            --accent-hover: #a78bfa;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        .light {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F9FAFB;
            --bg-tertiary: #F3F4F6;
            --bg-elevated: #E5E7EB;
            --text-primary: #1F2937;
            --text-secondary: #4B5563;
            --text-muted: #9CA3AF;
            --border-color: #E5E7EB;
            --accent: #8b5cf6;
            --accent-hover: #a78bfa;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* Search highlight styling */
        mark {
            background: rgba(139, 92, 246, 0.3);
            color: var(--text-primary);
            padding: 0 2px;
            border-radius: 2px;
        }

        .light mark {
            background: rgba(139, 92, 246, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background-color: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-toggle {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 8px 12px;
            cursor: pointer;
            color: var(--text-primary);
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background: var(--border-color);
        }

        .export-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .export-btn:hover {
            background: var(--accent-hover);
        }

        .export-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        /* Main Layout */
        .main-container {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            gap: 24px;
            padding: 24px;
        }

        /* Filters Panel */
        .filters-panel {
            width: 280px;
            flex-shrink: 0;
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 100px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }

        .filter-section {
            margin-bottom: 24px;
        }

        .filter-section:last-child {
            margin-bottom: 0;
        }

        .filter-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
        }

        .filter-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        /* Search Box */
        .search-box {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .search-box::placeholder {
            color: var(--text-muted);
        }

        /* Year Range Slider */
        .year-range-container {
            padding: 0 4px;
        }

        .year-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .range-slider {
            position: relative;
            height: 6px;
            margin: 16px 0;
        }

        .range-track {
            position: absolute;
            width: 100%;
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
        }

        .range-selected {
            position: absolute;
            height: 6px;
            background: var(--accent);
            border-radius: 3px;
        }

        .range-input {
            position: absolute;
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            pointer-events: none;
        }

        .range-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--bg-primary);
            border: 2px solid var(--accent);
            border-radius: 50%;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s;
        }

        .range-input::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        .range-input::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: var(--bg-primary);
            border: 2px solid var(--accent);
            border-radius: 50%;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: var(--shadow-sm);
        }

        /* Dropdown */
        .filter-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Checkboxes */
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--text-secondary);
            padding: 6px 8px;
            border-radius: var(--radius-sm);
            transition: background 0.2s;
        }

        .checkbox-label:hover {
            background: var(--bg-tertiary);
        }

        .checkbox-input {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .gender-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .gender-indicator.male {
            background: var(--male-color);
        }

        .gender-indicator.female {
            background: var(--female-color);
        }

        .gender-indicator.unknown {
            background: var(--text-muted);
        }

        /* Party Multi-Select */
        .party-select-container {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
        }

        .party-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--text-secondary);
            transition: background 0.2s;
        }

        .party-option:hover {
            background: var(--bg-tertiary);
        }

        .party-option.selected {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
        }

        .no-parties {
            padding: 12px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-style: italic;
        }

        /* Sort Dropdown */
        .sort-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sort-select {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
        }

        .sort-direction {
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .sort-direction:hover {
            background: var(--bg-tertiary);
        }

        /* Clear Filters */
        .clear-filters-btn {
            width: 100%;
            padding: 10px 16px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
        }

        .clear-filters-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        /* Results Area */
        .results-area {
            flex: 1;
            min-width: 0;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .results-count {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .results-count strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .select-all-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .select-all-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        /* Speech Cards Grid */
        .speeches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .speech-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .speech-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--accent);
        }

        .speech-card.expanded {
            grid-column: 1 / -1;
            background: var(--bg-secondary);
            border-color: var(--accent);
            box-shadow: var(--shadow-lg);
        }

        .speech-card.selected {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.05);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 12px;
        }

        .speaker-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .gender-badge {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .gender-badge.male {
            background: var(--male-color);
        }

        .gender-badge.female {
            background: var(--female-color);
        }

        .gender-badge.unknown {
            background: var(--text-muted);
        }

        .speaker-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-select {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
            flex-shrink: 0;
        }

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .meta-tag {
            font-size: 0.75rem;
            padding: 4px 8px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
        }

        .meta-tag.chamber {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
        }

        .debate-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .speech-preview {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .speech-full {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.7;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .expand-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
            text-align: right;
        }

        .speech-card.expanded .expand-hint {
            color: var(--accent);
            font-weight: 500;
        }

        /* Clickable links */
        .speaker-link {
            cursor: pointer;
            transition: color 0.2s;
        }

        .speaker-link:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .debate-link {
            cursor: pointer;
            transition: color 0.2s;
        }

        .debate-link:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        /* Detail Panel (Modal) */
        .detail-panel {
            display: none;
            position: fixed;
            top: 0;
            right: 0;
            width: 500px;
            max-width: 100%;
            height: 100vh;
            background: var(--bg-primary);
            border-left: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            z-index: 200;
            overflow-y: auto;
        }

        .detail-panel.open {
            display: block;
        }

        .detail-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            z-index: 10;
        }

        .detail-panel-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .detail-panel-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: var(--radius-sm);
        }

        .detail-panel-close:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .detail-panel-content {
            padding: 20px;
        }

        .detail-section {
            margin-bottom: 24px;
        }

        .detail-section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 12px;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .speech-list-item {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
        }

        .speech-list-item:hover {
            background: var(--bg-secondary);
        }

        .speech-list-item:last-child {
            border-bottom: none;
        }

        .speech-list-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .speech-list-text {
            font-size: 0.875rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .panel-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 199;
        }

        .panel-overlay.open {
            display: block;
        }

        /* Loading State */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
            color: var(--text-muted);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-muted);
        }

        .empty-state h3 {
            font-size: 1.125rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 0.875rem;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                padding: 16px;
            }

            .filters-panel {
                width: 100%;
                position: static;
            }

            .header-content {
                flex-direction: column;
                align-items: stretch;
            }

            .header h1 {
                text-align: center;
            }

            .header-actions {
                justify-content: center;
            }

            .speeches-grid {
                grid-template-columns: 1fr;
            }

            .results-header {
                flex-direction: column;
                align-items: stretch;
            }
        }

        /* Filter Stats */
        .filter-stats {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .filter-stat {
            font-size: 0.75rem;
            padding: 4px 8px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
        }

        /* Mobile Filter Toggle */
        .mobile-filter-toggle {
            display: none;
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 16px;
        }

        @media (max-width: 768px) {
            .mobile-filter-toggle {
                display: block;
            }

            .filters-panel {
                display: none;
            }

            .filters-panel.open {
                display: block;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>Hansard Speech Browser</h1>
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggle">Light Mode</button>
                <button class="export-btn" id="exportBtn" disabled>Export Selected (0)</button>
            </div>
        </div>
    </header>

    <main class="main-container">
        <button class="mobile-filter-toggle" id="mobileFilterToggle">Toggle Filters</button>

        <aside class="filters-panel" id="filtersPanel">
            <div class="filter-section" style="background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(99,102,241,0.05)); border-radius: 8px; padding: 12px; margin-bottom: 16px;">
                <label class="filter-label" style="margin-bottom: 8px;">Data Source</label>
                <div style="display: flex; gap: 8px;">
                    <button id="modeSample" class="mode-btn active" style="flex:1; padding: 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--accent); color: white; cursor: pointer; font-size: 12px;">
                        Sample (2K)
                    </button>
                    <button id="modeAPI" class="mode-btn" style="flex:1; padding: 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-elevated); color: var(--text-secondary); cursor: pointer; font-size: 12px;" title="Requires: python api_server.py">
                        Full (6.8M)
                    </button>
                </div>
                <div id="apiStatus" style="font-size: 11px; color: var(--text-muted); margin-top: 8px; display: none;">
                    Requires API server: python api_server.py
                </div>
            </div>

            <div class="filter-section">
                <label class="filter-label">Search</label>
                <input type="text" class="search-box" id="searchInput" placeholder="Search speeches...">
            </div>

            <div class="filter-section">
                <label class="filter-label">Year Range</label>
                <div class="year-range-container">
                    <div class="year-display">
                        <span id="yearMinDisplay">1920</span>
                        <span id="yearMaxDisplay">2000</span>
                    </div>
                    <div class="range-slider">
                        <div class="range-track"></div>
                        <div class="range-selected" id="rangeSelected"></div>
                        <input type="range" class="range-input" id="yearMin" min="1920" max="2000" value="1920">
                        <input type="range" class="range-input" id="yearMax" min="1920" max="2000" value="2000">
                    </div>
                </div>
            </div>

            <div class="filter-section">
                <label class="filter-label">Chamber</label>
                <select class="filter-select" id="chamberFilter">
                    <option value="">All Chambers</option>
                    <option value="Commons">Commons</option>
                    <option value="Lords">Lords</option>
                </select>
            </div>

            <div class="filter-section">
                <label class="filter-label">Gender</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" class="checkbox-input" id="genderMale" checked>
                        <span class="gender-indicator male"></span>
                        Male
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="checkbox-input" id="genderFemale" checked>
                        <span class="gender-indicator female"></span>
                        Female
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="checkbox-input" id="genderUnknown" checked>
                        <span class="gender-indicator unknown"></span>
                        Unknown
                    </label>
                </div>
            </div>

            <div class="filter-section">
                <label class="filter-label">Party</label>
                <div class="party-select-container" id="partyContainer">
                    <div class="no-parties">No party data available</div>
                </div>
            </div>

            <div class="filter-section">
                <label class="filter-label">Sort By</label>
                <div class="sort-container">
                    <select class="sort-select" id="sortBy">
                        <option value="date">Date</option>
                        <option value="word_count">Word Count</option>
                        <option value="speaker">Speaker Name</option>
                    </select>
                    <button class="sort-direction" id="sortDirection" title="Toggle sort direction">Desc</button>
                </div>
            </div>

            <button class="clear-filters-btn" id="clearFilters">Clear All Filters</button>

            <div class="filter-stats" id="filterStats"></div>
        </aside>

        <section class="results-area">
            <div class="results-header">
                <div class="results-count" id="resultsCount">Loading...</div>
                <div class="select-all-container">
                    <input type="checkbox" class="checkbox-input" id="selectAll">
                    <label class="select-all-label" for="selectAll">Select all visible</label>
                </div>
            </div>

            <div class="speeches-grid" id="speechesGrid">
                <div class="loading">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Detail Panel for Speaker/Debate -->
    <div class="panel-overlay" id="panelOverlay"></div>
    <div class="detail-panel" id="detailPanel">
        <div class="detail-panel-header">
            <span class="detail-panel-title" id="panelTitle">Details</span>
            <button class="detail-panel-close" id="panelClose">&times;</button>
        </div>
        <div class="detail-panel-content" id="panelContent">
            <!-- Dynamic content -->
        </div>
    </div>

    <script>
        // State
        let allSpeeches = [];
        let filteredSpeeches = [];
        let selectedSpeeches = new Set();
        let expandedCard = null;
        let sortAscending = false;

        // DOM Elements
        const searchInput = document.getElementById('searchInput');
        const yearMin = document.getElementById('yearMin');
        const yearMax = document.getElementById('yearMax');
        const yearMinDisplay = document.getElementById('yearMinDisplay');
        const yearMaxDisplay = document.getElementById('yearMaxDisplay');
        const rangeSelected = document.getElementById('rangeSelected');
        const chamberFilter = document.getElementById('chamberFilter');
        const genderMale = document.getElementById('genderMale');
        const genderFemale = document.getElementById('genderFemale');
        const genderUnknown = document.getElementById('genderUnknown');
        const partyContainer = document.getElementById('partyContainer');
        const sortBy = document.getElementById('sortBy');
        const sortDirection = document.getElementById('sortDirection');
        const clearFilters = document.getElementById('clearFilters');
        const resultsCount = document.getElementById('resultsCount');
        const speechesGrid = document.getElementById('speechesGrid');
        const selectAll = document.getElementById('selectAll');
        const exportBtn = document.getElementById('exportBtn');
        const themeToggle = document.getElementById('themeToggle');
        const mobileFilterToggle = document.getElementById('mobileFilterToggle');
        const filtersPanel = document.getElementById('filtersPanel');
        const filterStats = document.getElementById('filterStats');
        const modeSample = document.getElementById('modeSample');
        const modeAPI = document.getElementById('modeAPI');
        const apiStatus = document.getElementById('apiStatus');
        const detailPanel = document.getElementById('detailPanel');
        const panelOverlay = document.getElementById('panelOverlay');
        const panelTitle = document.getElementById('panelTitle');
        const panelContent = document.getElementById('panelContent');
        const panelClose = document.getElementById('panelClose');

        let dataMode = 'sample'; // 'sample' or 'api'
        const API_URL = 'http://localhost:5001';

        // Panel functions
        function openPanel(title, content) {
            panelTitle.textContent = title;
            panelContent.innerHTML = content;
            detailPanel.classList.add('open');
            panelOverlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closePanel() {
            detailPanel.classList.remove('open');
            panelOverlay.classList.remove('open');
            document.body.style.overflow = '';
        }

        panelClose.addEventListener('click', closePanel);
        panelOverlay.addEventListener('click', closePanel);

        // Speaker profile function
        async function showSpeakerProfile(speakerName) {
            if (dataMode !== 'api') {
                // Sample mode - filter local data
                const speakerSpeeches = allSpeeches.filter(s =>
                    (s.canonical_name || s.speaker) === speakerName
                );
                const stats = {
                    total: speakerSpeeches.length,
                    first_year: Math.min(...speakerSpeeches.map(s => s.year)),
                    last_year: Math.max(...speakerSpeeches.map(s => s.year)),
                    total_words: speakerSpeeches.reduce((sum, s) => sum + (s.word_count || 0), 0)
                };
                renderSpeakerPanel(speakerName, stats, speakerSpeeches.slice(0, 20));
                return;
            }

            // API mode - fetch from server
            openPanel('Loading...', '<div class="loading"><div class="loading-spinner"></div></div>');
            try {
                const res = await fetch(`${API_URL}/api/speaker?name=${encodeURIComponent(speakerName)}&limit=50`);
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                renderSpeakerPanel(speakerName, data.stats, data.speeches);
            } catch (e) {
                openPanel('Error', `<p>Could not load speaker profile: ${e.message}</p>`);
            }
        }

        function renderSpeakerPanel(name, stats, speeches) {
            const content = `
                <div class="detail-section">
                    <div class="detail-section-title">Speaker Statistics</div>
                    <div class="stat-grid">
                        <div class="stat-card">
                            <div class="stat-value">${stats.total.toLocaleString()}</div>
                            <div class="stat-label">Total Speeches</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${stats.total_words.toLocaleString()}</div>
                            <div class="stat-label">Total Words</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${stats.first_year}</div>
                            <div class="stat-label">First Speech</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${stats.last_year}</div>
                            <div class="stat-label">Last Speech</div>
                        </div>
                    </div>
                </div>
                <div class="detail-section">
                    <div class="detail-section-title">Recent Speeches (${Math.min(speeches.length, 50)} shown)</div>
                    <div class="speech-list">
                        ${speeches.map(s => `
                            <div class="speech-list-item" onclick="showDebateContext('${escapeHtml(s.debate_id)}')">
                                <div class="speech-list-meta">${s.date || s.year} - ${escapeHtml(s.title || 'Untitled')}</div>
                                <div class="speech-list-text">${escapeHtml((s.text || s.snippet || '').substring(0, 150))}...</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            openPanel(name, content);
        }

        // Fetch full speech text from API
        async function fetchFullSpeechText(speechId) {
            try {
                const res = await fetch(`${API_URL}/api/speech?id=${encodeURIComponent(speechId)}`);
                const data = await res.json();
                if (data.text) {
                    // Update the speech in our arrays with full text
                    const updateSpeech = (arr) => {
                        const idx = arr.findIndex(s => s.speech_id === speechId);
                        if (idx >= 0) {
                            arr[idx].text = data.text;
                            arr[idx].fullTextLoaded = true;
                        }
                    };
                    updateSpeech(allSpeeches);
                    updateSpeech(filteredSpeeches);
                }
            } catch (e) {
                console.error('Failed to fetch full speech text:', e);
            }
        }

        // Debate context function
        async function showDebateContext(debateId) {
            if (!debateId) return;

            if (dataMode !== 'api') {
                // Sample mode - filter local data
                const debateSpeeches = allSpeeches.filter(s => s.debate_id === debateId);
                if (debateSpeeches.length === 0) {
                    openPanel('Debate', '<p>No speeches found for this debate in sample data.</p>');
                    return;
                }
                const debateInfo = {
                    title: debateSpeeches[0].title,
                    date: debateSpeeches[0].date,
                    chamber: debateSpeeches[0].chamber
                };
                const speakers = [...new Set(debateSpeeches.map(s => s.canonical_name || s.speaker))];
                renderDebatePanel(debateInfo, speakers, debateSpeeches);
                return;
            }

            // API mode - fetch from server
            openPanel('Loading...', '<div class="loading"><div class="loading-spinner"></div></div>');
            try {
                const res = await fetch(`${API_URL}/api/debate?id=${encodeURIComponent(debateId)}`);
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                // Extract speaker names from debate.speakers (which is an array of objects)
                const speakerNames = (data.debate.speakers || []).map(s => s.name);
                renderDebatePanel(data.debate, speakerNames, data.speeches);
            } catch (e) {
                openPanel('Error', `<p>Could not load debate: ${e.message}</p>`);
            }
        }

        function renderDebatePanel(debate, speakers, speeches) {
            const content = `
                <div class="detail-section">
                    <div class="detail-section-title">Debate Information</div>
                    <div class="stat-grid">
                        <div class="stat-card">
                            <div class="stat-value">${speeches.length}</div>
                            <div class="stat-label">Speeches</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${speakers.length}</div>
                            <div class="stat-label">Speakers</div>
                        </div>
                    </div>
                    <div style="margin-top: 12px; font-size: 0.875rem; color: var(--text-secondary);">
                        <strong>Date:</strong> ${debate.date || 'Unknown'}<br>
                        <strong>Chamber:</strong> ${debate.chamber || 'Unknown'}
                    </div>
                </div>
                <div class="detail-section">
                    <div class="detail-section-title">Speakers in this Debate</div>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                        ${speakers.map(s => `
                            <span class="meta-tag speaker-link" style="cursor: pointer;" onclick="showSpeakerProfile('${escapeHtml(s)}')">${escapeHtml(s)}</span>
                        `).join('')}
                    </div>
                </div>
                <div class="detail-section">
                    <div class="detail-section-title">All Speeches</div>
                    <div class="speech-list">
                        ${speeches.map(s => `
                            <div class="speech-list-item" style="cursor: default;">
                                <div class="speech-list-meta">
                                    <span class="speaker-link" onclick="showSpeakerProfile('${escapeHtml(s.canonical_name || s.speaker)}')">${escapeHtml(s.canonical_name || s.speaker)}</span>
                                    - ${(s.word_count || 0).toLocaleString()} words
                                </div>
                                <div class="speech-list-text" style="-webkit-line-clamp: 4;">${escapeHtml((s.text || s.snippet || '').substring(0, 300))}...</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            openPanel(debate.title || 'Debate', content);
        }

        // Mode switching
        modeSample.addEventListener('click', () => {
            dataMode = 'sample';
            modeSample.style.background = 'var(--accent)';
            modeSample.style.color = 'white';
            modeAPI.style.background = 'var(--bg-elevated)';
            modeAPI.style.color = 'var(--text-secondary)';
            apiStatus.style.display = 'none';
            init();
        });

        modeAPI.addEventListener('click', async () => {
            // Check if API is available
            try {
                const res = await fetch(`${API_URL}/api/stats`);
                if (!res.ok) throw new Error('API not available');

                dataMode = 'api';
                modeAPI.style.background = 'var(--accent)';
                modeAPI.style.color = 'white';
                modeSample.style.background = 'var(--bg-elevated)';
                modeSample.style.color = 'var(--text-secondary)';
                apiStatus.style.display = 'none';

                // Show API mode UI
                speechesGrid.innerHTML = `
                    <div class="empty-state">
                        <h3>Full-Text Search (6.8M speeches)</h3>
                        <p>Enter a search term to find speeches across the entire dataset.</p>
                        <p style="font-size: 12px; color: var(--text-muted);">Use specific terms for best results.</p>
                    </div>
                `;
                resultsCount.innerHTML = `<strong>6,783,015</strong> speeches available - enter search term`;
            } catch (e) {
                apiStatus.style.display = 'block';
                apiStatus.innerHTML = '<span style="color: #ef4444;">API not running.</span> Start with: python api_server.py';
            }
        });

        // Initialize
        async function init() {
            try {
                const response = await fetch('data/speeches_sample.json');
                allSpeeches = await response.json();

                // Initialize year range
                const years = allSpeeches.map(s => s.year);
                const minYear = Math.min(...years);
                const maxYear = Math.max(...years);
                yearMin.min = minYear;
                yearMin.max = maxYear;
                yearMax.min = minYear;
                yearMax.max = maxYear;
                yearMin.value = minYear;
                yearMax.value = maxYear;

                // Build party filter
                buildPartyFilter();

                // Apply initial filters
                applyFilters();
                updateRangeSlider();

            } catch (error) {
                console.error('Failed to load speeches:', error);
                speechesGrid.innerHTML = '<div class="empty-state"><h3>Error loading data</h3><p>Could not load speeches data.</p></div>';
            }
        }

        // Build party filter options
        function buildPartyFilter() {
            const parties = [...new Set(allSpeeches.map(s => s.party).filter(p => p && p.trim()))].sort();

            if (parties.length === 0) {
                partyContainer.innerHTML = '<div class="no-parties">No party data available</div>';
                return;
            }

            partyContainer.innerHTML = parties.map(party => `
                <div class="party-option" data-party="${escapeHtml(party)}">
                    <input type="checkbox" class="checkbox-input party-checkbox" value="${escapeHtml(party)}" checked>
                    ${escapeHtml(party)}
                </div>
            `).join('');

            // Add click handlers
            partyContainer.querySelectorAll('.party-option').forEach(option => {
                option.addEventListener('click', (e) => {
                    if (e.target.type !== 'checkbox') {
                        const checkbox = option.querySelector('.party-checkbox');
                        checkbox.checked = !checkbox.checked;
                    }
                    option.classList.toggle('selected', option.querySelector('.party-checkbox').checked);
                    applyFilters();
                });
            });
        }

        // Update range slider visual
        function updateRangeSlider() {
            const minVal = parseInt(yearMin.value);
            const maxVal = parseInt(yearMax.value);
            const range = parseInt(yearMax.max) - parseInt(yearMin.min);

            const minPercent = ((minVal - parseInt(yearMin.min)) / range) * 100;
            const maxPercent = ((maxVal - parseInt(yearMin.min)) / range) * 100;

            rangeSelected.style.left = minPercent + '%';
            rangeSelected.style.width = (maxPercent - minPercent) + '%';

            yearMinDisplay.textContent = minVal;
            yearMaxDisplay.textContent = maxVal;
        }

        // Apply all filters
        async function applyFilters() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            const minYear = parseInt(yearMin.value);
            const maxYear = parseInt(yearMax.value);
            const chamber = chamberFilter.value;

            const genderFilters = [];
            if (genderMale.checked) genderFilters.push('M');
            if (genderFemale.checked) genderFilters.push('F');
            if (genderUnknown.checked) genderFilters.push('');

            // API mode - use FTS search
            if (dataMode === 'api') {
                if (!searchTerm) {
                    speechesGrid.innerHTML = `
                        <div class="empty-state">
                            <h3>Full-Text Search (6.8M speeches)</h3>
                            <p>Enter a search term to find speeches across the entire dataset.</p>
                        </div>
                    `;
                    resultsCount.innerHTML = `<strong>6,783,015</strong> speeches available - enter search term`;
                    return;
                }

                try {
                    speechesGrid.innerHTML = '<div class="empty-state"><h3>Searching...</h3></div>';
                    const params = new URLSearchParams({ q: searchTerm, limit: 200 });
                    if (genderFilters.length === 1) params.append('gender', genderFilters[0]);
                    if (minYear) params.append('year_from', minYear);
                    if (maxYear) params.append('year_max', maxYear);

                    const res = await fetch(`${API_URL}/api/fts?${params}`);
                    const data = await res.json();

                    if (data.error) throw new Error(data.error);

                    // Convert API results to speech format
                    filteredSpeeches = data.results.map(r => ({
                        ...r,
                        speech_id: r.speech_id || r.id,
                        text: r.snippet || r.text,
                        speaker: r.speaker || r.canonical_name
                    }));

                    // Apply local chamber filter
                    if (chamber) {
                        filteredSpeeches = filteredSpeeches.filter(s => s.chamber === chamber);
                    }

                    renderSpeeches();
                    resultsCount.innerHTML = `Found <strong>${data.total.toLocaleString()}</strong> speeches (showing ${filteredSpeeches.length})`;
                    updateFilterStats();
                } catch (e) {
                    speechesGrid.innerHTML = `<div class="empty-state"><h3>Search Error</h3><p>${e.message}</p></div>`;
                }
                return;
            }

            // Sample mode - local filtering
            const partyCheckboxes = partyContainer.querySelectorAll('.party-checkbox');
            const selectedParties = Array.from(partyCheckboxes)
                .filter(cb => cb.checked)
                .map(cb => cb.value);
            const hasPartyFilter = partyCheckboxes.length > 0;

            filteredSpeeches = allSpeeches.filter(speech => {
                // Year filter
                if (speech.year < minYear || speech.year > maxYear) return false;

                // Chamber filter
                if (chamber && speech.chamber !== chamber) return false;

                // Gender filter
                if (!genderFilters.includes(speech.gender)) return false;

                // Party filter (only if parties exist in data)
                if (hasPartyFilter && speech.party && !selectedParties.includes(speech.party)) return false;

                // Search filter
                if (searchTerm) {
                    const searchableText = [
                        speech.speaker,
                        speech.canonical_name,
                        speech.text,
                        speech.title,
                        speech.constituency
                    ].filter(Boolean).join(' ').toLowerCase();

                    if (!searchableText.includes(searchTerm)) return false;
                }

                return true;
            });

            // Apply sorting
            sortSpeeches();

            // Update UI
            renderSpeeches();
            updateResultsCount();
            updateFilterStats();
            updateSelectAllState();
        }

        // Sort speeches
        function sortSpeeches() {
            const field = sortBy.value;
            const multiplier = sortAscending ? 1 : -1;

            filteredSpeeches.sort((a, b) => {
                let aVal, bVal;

                switch (field) {
                    case 'date':
                        aVal = a.year;
                        bVal = b.year;
                        break;
                    case 'word_count':
                        aVal = a.word_count;
                        bVal = b.word_count;
                        break;
                    case 'speaker':
                        aVal = (a.canonical_name || a.speaker || '').toLowerCase();
                        bVal = (b.canonical_name || b.speaker || '').toLowerCase();
                        return multiplier * aVal.localeCompare(bVal);
                }

                return multiplier * (aVal - bVal);
            });
        }

        // Render speeches
        function renderSpeeches() {
            if (filteredSpeeches.length === 0) {
                speechesGrid.innerHTML = `
                    <div class="empty-state">
                        <h3>No speeches found</h3>
                        <p>Try adjusting your filters or search terms.</p>
                    </div>
                `;
                return;
            }

            speechesGrid.innerHTML = filteredSpeeches.map(speech => {
                const isExpanded = expandedCard === speech.speech_id;
                const isSelected = selectedSpeeches.has(speech.speech_id);
                const genderClass = speech.gender === 'M' ? 'male' : (speech.gender === 'F' ? 'female' : 'unknown');
                const speakerName = speech.canonical_name || speech.speaker || 'Unknown';
                // Extract debate_id from speech_id (format: {debate_id}_speech_{n}) or use provided debate_id
                const debateId = speech.debate_id || (speech.speech_id ? speech.speech_id.split('_speech_')[0] : '');

                return `
                    <div class="speech-card ${isExpanded ? 'expanded' : ''} ${isSelected ? 'selected' : ''}"
                         data-id="${speech.speech_id}">
                        <div class="card-header">
                            <div class="speaker-info">
                                <span class="gender-badge ${genderClass}" title="${speech.gender === 'M' ? 'Male' : (speech.gender === 'F' ? 'Female' : 'Unknown')}"></span>
                                <span class="speaker-name speaker-link"
                                      title="Click to view ${escapeHtml(speakerName)}'s profile"
                                      data-speaker="${escapeHtml(speakerName)}">${escapeHtml(speakerName)}</span>
                            </div>
                            <input type="checkbox" class="card-select" ${isSelected ? 'checked' : ''}
                                   onclick="event.stopPropagation(); toggleSelect('${speech.speech_id}')">
                        </div>
                        <div class="card-meta">
                            <span class="meta-tag">${speech.date}</span>
                            <span class="meta-tag chamber">${speech.chamber}</span>
                            <span class="meta-tag">${(speech.word_count || 0).toLocaleString()} words</span>
                        </div>
                        <div class="debate-title debate-link"
                             title="Click to view full debate"
                             data-debate="${escapeHtml(debateId)}">${escapeHtml(speech.title || 'Untitled')}</div>
                        ${isExpanded ?
                            `<div class="speech-full">${escapeHtmlPreserveMark(speech.text)}</div>
                             <div class="expand-hint">Click card to collapse</div>` :
                            `<div class="speech-preview">${escapeHtmlPreserveMark(speech.text_preview || (speech.text || '').substring(0, 200) + '...')}</div>
                             <div class="expand-hint">Click card to expand</div>`
                        }
                    </div>
                `;
            }).join('');

            // Add click handlers
            speechesGrid.querySelectorAll('.speech-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    // Don't expand if clicking on checkbox
                    if (e.target.type === 'checkbox' || e.target.classList.contains('card-select')) return;

                    // Handle speaker link click - use closest() for reliable detection
                    const speakerLink = e.target.closest('.speaker-link');
                    if (speakerLink && card.contains(speakerLink)) {
                        e.stopPropagation();
                        e.preventDefault();
                        const speakerName = speakerLink.dataset.speaker;
                        if (speakerName) showSpeakerProfile(speakerName);
                        return;
                    }

                    // Handle debate link click - navigate to Debate Viewer
                    const debateLink = e.target.closest('.debate-link');
                    if (debateLink && card.contains(debateLink)) {
                        e.stopPropagation();
                        e.preventDefault();
                        const debateId = debateLink.dataset.debate;
                        if (debateId) {
                            // Navigate to Debate Viewer with this debate pre-selected
                            window.location.href = `../debate-viewer/index.html?debate=${encodeURIComponent(debateId)}`;
                        }
                        return;
                    }

                    // Default: toggle card expansion
                    const id = card.dataset.id;
                    if (expandedCard === id) {
                        expandedCard = null;
                    } else {
                        expandedCard = id;
                        // If in API mode, fetch full text asynchronously (but don't block expansion)
                        if (dataMode === 'api') {
                            fetchFullSpeechText(id).then(() => renderSpeeches());
                        }
                    }
                    // Always render immediately so the card expands right away
                    renderSpeeches();
                });
            });
        }

        // Toggle speech selection
        function toggleSelect(id) {
            if (selectedSpeeches.has(id)) {
                selectedSpeeches.delete(id);
            } else {
                selectedSpeeches.add(id);
            }
            updateExportButton();
            updateSelectAllState();
            renderSpeeches();
        }

        // Update results count
        function updateResultsCount() {
            resultsCount.innerHTML = `Showing <strong>${filteredSpeeches.length.toLocaleString()}</strong> of <strong>${allSpeeches.length.toLocaleString()}</strong> speeches`;
        }

        // Update filter stats
        function updateFilterStats() {
            const genderCounts = {M: 0, F: 0, '': 0};
            const chamberCounts = {Commons: 0, Lords: 0};

            filteredSpeeches.forEach(s => {
                genderCounts[s.gender] = (genderCounts[s.gender] || 0) + 1;
                chamberCounts[s.chamber] = (chamberCounts[s.chamber] || 0) + 1;
            });

            filterStats.innerHTML = `
                <span class="filter-stat">Male: ${genderCounts.M.toLocaleString()}</span>
                <span class="filter-stat">Female: ${genderCounts.F.toLocaleString()}</span>
                <span class="filter-stat">Unknown: ${genderCounts[''].toLocaleString()}</span>
                <span class="filter-stat">Commons: ${chamberCounts.Commons.toLocaleString()}</span>
                <span class="filter-stat">Lords: ${chamberCounts.Lords.toLocaleString()}</span>
            `;
        }

        // Update select all checkbox state
        function updateSelectAllState() {
            const visibleIds = new Set(filteredSpeeches.map(s => s.speech_id));
            const visibleSelected = [...selectedSpeeches].filter(id => visibleIds.has(id));

            selectAll.checked = visibleSelected.length === filteredSpeeches.length && filteredSpeeches.length > 0;
            selectAll.indeterminate = visibleSelected.length > 0 && visibleSelected.length < filteredSpeeches.length;
        }

        // Update export button
        function updateExportButton() {
            const count = selectedSpeeches.size;
            exportBtn.textContent = `Export Selected (${count})`;
            exportBtn.disabled = count === 0;
        }

        // Export selected speeches
        function exportSpeeches() {
            const toExport = allSpeeches.filter(s => selectedSpeeches.has(s.speech_id));
            const blob = new Blob([JSON.stringify(toExport, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `hansard_speeches_export_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Clear all filters
        function resetFilters() {
            searchInput.value = '';
            yearMin.value = yearMin.min;
            yearMax.value = yearMax.max;
            chamberFilter.value = '';
            genderMale.checked = true;
            genderFemale.checked = true;
            genderUnknown.checked = true;
            sortBy.value = 'date';
            sortAscending = false;
            sortDirection.textContent = 'Desc';

            partyContainer.querySelectorAll('.party-checkbox').forEach(cb => {
                cb.checked = true;
                cb.closest('.party-option').classList.remove('selected');
            });

            expandedCard = null;
            updateRangeSlider();
            applyFilters();
        }

        // Toggle theme
        function toggleTheme() {
            document.body.classList.toggle('light');
            const isLight = document.body.classList.contains('light');
            themeToggle.textContent = isLight ? 'Dark Mode' : 'Light Mode';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        // Escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Escape HTML but preserve <mark> tags for search highlighting
        function escapeHtmlPreserveMark(text) {
            if (!text) return '';
            // Replace <mark> and </mark> with placeholders
            const markOpen = '\u0001MARK_OPEN\u0001';
            const markClose = '\u0001MARK_CLOSE\u0001';
            let safe = text.replace(/<mark>/gi, markOpen).replace(/<\/mark>/gi, markClose);
            // Escape the rest
            const div = document.createElement('div');
            div.textContent = safe;
            safe = div.innerHTML;
            // Restore <mark> tags
            return safe.replace(new RegExp(markOpen, 'g'), '<mark>').replace(new RegExp(markClose, 'g'), '</mark>');
        }

        // Debounce helper
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        // Event Listeners
        searchInput.addEventListener('input', debounce(applyFilters, 300));

        // Debounced filter application for sliders (fires during drag)
        const debouncedApplyFilters = debounce(applyFilters, 400);

        yearMin.addEventListener('input', () => {
            if (parseInt(yearMin.value) > parseInt(yearMax.value)) {
                yearMin.value = yearMax.value;
            }
            updateRangeSlider();
            debouncedApplyFilters();
        });

        yearMax.addEventListener('input', () => {
            if (parseInt(yearMax.value) < parseInt(yearMin.value)) {
                yearMax.value = yearMin.value;
            }
            updateRangeSlider();
            debouncedApplyFilters();
        });

        // Checkboxes apply filters immediately (discrete changes)
        chamberFilter.addEventListener('change', applyFilters);
        genderMale.addEventListener('change', applyFilters);
        genderFemale.addEventListener('change', applyFilters);
        genderUnknown.addEventListener('change', applyFilters);

        sortBy.addEventListener('change', () => {
            sortSpeeches();
            renderSpeeches();
        });

        sortDirection.addEventListener('click', () => {
            sortAscending = !sortAscending;
            sortDirection.textContent = sortAscending ? 'Asc' : 'Desc';
            sortSpeeches();
            renderSpeeches();
        });

        clearFilters.addEventListener('click', resetFilters);

        selectAll.addEventListener('change', () => {
            if (selectAll.checked) {
                filteredSpeeches.forEach(s => selectedSpeeches.add(s.speech_id));
            } else {
                filteredSpeeches.forEach(s => selectedSpeeches.delete(s.speech_id));
            }
            updateExportButton();
            renderSpeeches();
        });

        exportBtn.addEventListener('click', exportSpeeches);
        themeToggle.addEventListener('click', toggleTheme);

        mobileFilterToggle.addEventListener('click', () => {
            filtersPanel.classList.toggle('open');
        });

        // Load saved theme preference (default to dark)
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light');
            themeToggle.textContent = 'Dark Mode';
        } else {
            themeToggle.textContent = 'Light Mode';
        }

        // Initialize app
        init();
    </script>
</body>
</html>
